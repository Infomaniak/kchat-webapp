stages:
  - install
  - build_packages
  - quality
  - build
  - test_e2e
  - release
  - deploy

variables:
  KANIKO_VERSION: "debug"
  MINIO_CLIENT_VERSION: "RELEASE.2022-11-07T23-47-39Z"
  NODE_VERSION: 20.11.1
  SENTRY_VERSION: 2.17.1
  RUBY_VERSION: 3.3.1
  PLAYWRIGHT_VERSION: "v1.43.1-jammy"
  NOTIFY_CHANNEL: ${KCHAT_WHOOK_URL}

.rule-commit: &rule-commit
  - if: $CI_COMMIT_BEFORE_SHA == "0000000000000000000000000000000000000000"
    when: never
  - if: $CI_PIPELINE_SOURCE == "push"

.rule-preprod: &rule-preprod
  - if: &if-preprod "$CI_COMMIT_TAG =~ /\\-rc.*/"
    when: on_success

.rule-canary: &rule-canary
  - if: &if-canary "$CI_COMMIT_TAG =~ /\\-next.*/"
    when: on_success
    allow_failure: false

.rule-prod: &rule-prod
  - if: &if-tag "$CI_COMMIT_TAG"
    when: on_success
    allow_failure: false

.rule-prodsec: &rule-prodsec
  - if: &if-master-commit $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    when: on_success

.rule-merge-request: &rule-merge-request
  - if: &if-merge-request '$CI_MERGE_REQUEST_ID && $CI_MERGE_REQUEST_DRAFT != "true"'
    when: on_success

.rule-scheduled: &rule-scheduled
  - if: &rule-scheduled-ref '$CI_PIPELINE_SOURCE == "schedule"'
    when: on_success

.rule-not-scheduled: &rule-not-scheduled
  - if: *rule-scheduled-ref
    when: never

.script-configure-kaniko: &script-configure-kaniko
  - echo "{\"auths\":{\"$CI_REGISTRY\":{\"username\":\"$CI_REGISTRY_USER\",\"password\":\"$CI_REGISTRY_PASSWORD\"},\"$CI_DEPENDENCY_PROXY_SERVER\":{\"username\":\"$CI_DEPENDENCY_PROXY_USER\",\"password\":\"$CI_DEPENDENCY_PROXY_PASSWORD\"}}}" > /kaniko/.docker/config.json

.cache-definition: &cache-definition
  key:
    files:
      - yarn.lock
  paths:
    - node_modules/
    - webapp/channels/node_modules/
    - webapp/platform/types/node_modules/
    - webapp/platform/client/node_modules/
    - webapp/platform/components/node_modules/
    - webapp/platform/mattermost-redux/node_modules/
    - webapp/platform/eslint-plugin/node_modules/
    - e2e-tests/cypress/node_modules/
    - e2e-tests/playwright/node_modules/
    - .yarn/cache/

.tests: &tests
  tags:
    - docker-executor
    - kubernetes
    - shared
  rules:
    - *rule-not-scheduled
    - *rule-merge-request
    - when: never
  environment:
    name: "$ENVIRONMENT_NAME"

workflow:
  rules:
    - if: *if-preprod
      variables:
        ENVIRONMENT_NAME: preprod
    - if: *if-canary
      variables:
        ENVIRONMENT_NAME: canary
    - if: *if-tag
      variables:
        ENVIRONMENT_NAME: prod
    - if: *if-master-commit
      variables:
        ENVIRONMENT_NAME: prodsec
    - if: *if-merge-request
      variables:
        ENVIRONMENT_NAME: "staging/${CI_COMMIT_REF_SLUG}"
    - when: never

install:deps:
  stage: install
  image: node:${NODE_VERSION}
  tags:
    - kubernetes
  rules:
    - *rule-not-scheduled
    - *rule-merge-request
    - *rule-preprod
    - *rule-canary
    - *rule-prod
    - *rule-prodsec
    - *rule-commit
    - when: never
  cache:
    <<: *cache-definition
    policy: pull-push
  script:
    - yarn --immutable --silent

build:packages:
  stage: build_packages
  image: node:${NODE_VERSION}
  tags:
    - kubernetes
  needs: ["install:deps"]
  rules:
    - *rule-not-scheduled
    - *rule-merge-request
    - *rule-preprod
    - *rule-canary
    - *rule-prod
    - *rule-prodsec
    - *rule-commit
    - when: never
  cache:
    <<: *cache-definition
    policy: pull
  script:
    - yarn workspace @infomaniak/mattermost-types build
    - yarn workspace @infomaniak/mattermost-client build
    - yarn workspace @mattermost/components build
  artifacts:
    paths:
      - webapp/platform/types/lib/
      - webapp/platform/client/lib/
      - webapp/platform/components/dist/
    expire_in: 1 day

translations:check:
  stage: quality
  image: node:${NODE_VERSION}
  tags:
    - kubernetes
  needs: ["install:deps"]
  rules:
    - *rule-merge-request
    - *rule-commit
  cache:
    <<: *cache-definition
    policy: pull
  script:
    - yarn workspace mattermost-webapp check:i18n:ci
    - git diff --exit-code webapp/channels/src/i18n/ || { echo "i18n files changed, commit the updates."; exit 1; }

lint:eslint:
  stage: quality
  image: node:${NODE_VERSION}
  tags:
    - kubernetes
  needs:
    - job: "install:deps"
    - job: "build:packages"
      artifacts: true
  rules:
    - *rule-merge-request
    - *rule-commit
  cache:
    <<: *cache-definition
    policy: pull
  script:
    - yarn workspace mattermost-webapp check:eslint
  artifacts:
    reports:
      codequality: gl-codequality.json
    expire_in: 1 week
    when: on_failure

check-types:typescript:
  stage: quality
  image: node:${NODE_VERSION}
  tags:
    - kubernetes
  needs:
    - job: "install:deps"
    - job: "build:packages"
      artifacts: true
  rules:
    - *rule-merge-request
    - *rule-commit
  cache:
    <<: *cache-definition
    policy: pull
  script:
    - yarn test:types

test:unit:
  stage: quality
  extends:
    - .tests
  image: node:${NODE_VERSION}
  needs:
    - job: "install:deps"
    - job: "build:packages"
      artifacts: true
  rules:
    - *rule-merge-request
    - *rule-prodsec
    - when: never
  cache:
    - <<: *cache-definition
      policy: pull
    - paths:
        - webapp/channels/.jestcache
  script:
    - yarn test:webapp
  artifacts:
    paths:
      - webapp/channels/coverage/
    expire_in: 1 day
    reports:
      junit: webapp/channels/coverage/junit.xml
      coverage_report:
        coverage_format: cobertura
        path: webapp/channels/coverage/cobertura-coverage.xml
  coverage: /Lines\s*:\s*(\d+.?\d*)%/

build:front:
  stage: build
  image: node:${NODE_VERSION}
  tags:
    - kubernetes
  needs:
    - job: "install:deps"
    - job: "build:packages"
      artifacts: true
  rules:
    - *rule-preprod
    - *rule-canary
    - *rule-prod
    - *rule-merge-request
    - when: never
  environment:
    name: "$ENVIRONMENT_NAME"
  cache:
    <<: *cache-definition
    policy: pull
  script:
    - yarn build:webapp
  artifacts:
    paths:
      - dist/
    expire_in: 1 day

test:e2e:
  stage: test_e2e
  extends:
    - .tests
  image: ruby:${RUBY_VERSION}
  needs: ["build:front"]
  rules:
    - if: *if-merge-request
      when: manual
      allow_failure: true
    - when: never
  script:
    - echo "STAGING_BASE_URL=$(ruby .gitlab/get_staging_baseurl.rb)" >> test.env
  artifacts:
    expire_in: 1 day
    reports:
      dotenv: test.env

test:e2e:pw:
  stage: test_e2e
  extends:
    - .tests
  image: mcr.microsoft.com/playwright:${PLAYWRIGHT_VERSION}
  allow_failure: true
  needs:
    - job: "install:deps"
    - job: "test:e2e"
      artifacts: true
  variables:
    PW_BASE_URL: ${STAGING_BASE_URL}
    PW_ADMIN_EMAIL: ${E2E_ADMIN_EMAIL}
    PW_ADMIN_PASSWORD: ${E2E_ADMIN_PASSWORD}
  cache:
    <<: *cache-definition
    policy: pull
  script:
    - echo "Executing e2e Playwright tests on ${PW_BASE_URL}..."
    - yarn run test:e2e:playwright
  artifacts:
    paths:
      - e2e-tests/playwright/playwright-report
    expire_in: 1 day
    when: always

release:front:
  stage: release
  image:
    name: minio/mc:${MINIO_CLIENT_VERSION}
    entrypoint: [""]
  tags:
    - kubernetes
  needs: ["build:front"]
  rules:
    - *rule-preprod
    - *rule-canary
    - *rule-prod
    - *rule-merge-request
    - when: never
  environment:
    name: "$ENVIRONMENT_NAME"
  before_script:
    - mc config host add $S3_BUCKET $S3_HOST $S3_KEY $S3_PASSWORD --api s3v4
  script:
    - mc cp --recursive dist/ $S3_BUCKET/$S3_BUCKET/kchat/$ENVIRONMENT_NAME
  after_script:
    - mc rm --recursive --force --older-than 30d $S3_BUCKET/$S3_BUCKET/kchat/staging
    - mc rm --recursive --force --older-than 30d $S3_BUCKET/$S3_BUCKET/kchat/preprod

release:changelog:
  stage: .post
  image: ruby:${RUBY_VERSION}
  needs: ["release:front"]
  rules:
    - *rule-preprod
    - *rule-canary
    - *rule-prod
    - when: never
  environment:
    name: "$ENVIRONMENT_NAME"
  before_script:
    - curl -fsSL -o /tmp/git-cliff.tar.gz https://github.com/orhun/git-cliff/releases/download/v2.12.0/git-cliff-2.12.0-x86_64-unknown-linux-gnu.tar.gz
    - echo "${GIT_CLIFF_SHA256}  /tmp/git-cliff.tar.gz" | sha256sum -c -
    - tar -xzf /tmp/git-cliff.tar.gz -C /tmp/ --strip-components=1
    - mv /tmp/git-cliff /usr/local/bin/
    - chmod +x /usr/local/bin/git-cliff
  script:
    - ruby .gitlab/release.rb ${CI_COMMIT_TAG} ${CI_COMMIT_TAG:0:3} ${NOTIFY_CHANNEL}

pages:
  stage: deploy
  image: ruby:${RUBY_VERSION}
  needs: ["test:e2e:pw"]
  rules:
    - if: *if-merge-request
      variables:
        PAGES_PREFIX: "mr$CI_MERGE_REQUEST_IID"
  variables:
    PAGES_PREFIX: ""
  script:
    - cp -r e2e-tests/playwright/playwright-report public
  after_script:
    - ruby .gitlab/e2e_report_notify.rb
  pages:
    path_prefix: "$PAGES_PREFIX"
  artifacts:
    paths:
      - public

release:sentry:
  stage: .post
  image: getsentry/sentry-cli:${SENTRY_VERSION}
  tags:
    - docker-executor
    - kubernetes
    - shared
  needs: ["build:front"]
  rules:
    - *rule-preprod
    - *rule-canary
    - *rule-prod
    - when: never
  environment:
    name: "$ENVIRONMENT_NAME"
  script:
    - sentry-cli releases new ${CI_COMMIT_TAG}
    - sentry-cli releases set-commits --auto --ignore-empty --ignore-missing ${CI_COMMIT_TAG}
    - sentry-cli releases files ${CI_COMMIT_TAG} upload-sourcemaps --url-prefix '~/static/' ./dist --ignore-file .sentryignore
    - sentry-cli releases finalize ${CI_COMMIT_TAG}

deploy:image:
  stage: deploy
  image:
    name: gcr.io/kaniko-project/executor:${KANIKO_VERSION}
    entrypoint: [""]
  tags:
    - kubernetes
  needs: ["build:front"]
  rules:
    - if: *if-tag
      when: on_success
    - when: never
  before_script:
    - *script-configure-kaniko
  script:
    - /kaniko/executor
      --cache=true
      --registry-mirror=registry-mirror.infomaniak.ch
      --context ${CI_PROJECT_DIR}
      --dockerfile ${CI_PROJECT_DIR}/Dockerfile
      --destination ${CI_REGISTRY_IMAGE}:${CI_COMMIT_TAG}
